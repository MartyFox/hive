name: Bug report
description: Report a reproducible Hive bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For security vulnerabilities, do not open a public issue. See SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Hive version
      description: Output from `hive version`, or commit SHA if built from source.
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS, architecture, and Podman version.
      placeholder: macOS 15 arm64, Podman 5.x
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and config
      description: Include the Hive command and relevant non-secret config.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps that reproduce the bug.
    validations:
      required: true
