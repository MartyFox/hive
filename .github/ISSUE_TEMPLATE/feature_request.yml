name: Feature request
description: Propose a Hive improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, CLI shape, or config shape you want.
    validations:
      required: true
  - type: checkboxes
    id: impact
    attributes:
      label: Security-sensitive areas
      options:
        - label: Changes host mounts or mount validation
        - label: Changes token handling
        - label: Changes Podman flags or container privileges
        - label: Changes shell/prompt execution
        - label: None of the above
