name: Build and push hive images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Normalize GHCR owner to lowercase
        run: echo "OWNER_LC=${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        run: |
          docker build \
            -t hive-base \
            -t ghcr.io/${OWNER_LC}/hive-base:latest \
            -t ghcr.io/${OWNER_LC}/hive-base:${{ github.sha }} \
            internal/imgfs/images/base
          docker push ghcr.io/${OWNER_LC}/hive-base:latest
          docker push ghcr.io/${OWNER_LC}/hive-base:${{ github.sha }}

      - name: Build and push agent images
        run: |
          for agent in claude copilot gemini codex; do
            docker build \
              -f internal/imgfs/images/$agent/Containerfile \
              -t ghcr.io/${OWNER_LC}/hive-$agent:latest \
              -t ghcr.io/${OWNER_LC}/hive-$agent:${{ github.sha }} \
              internal/imgfs/images/$agent
            docker push ghcr.io/${OWNER_LC}/hive-$agent:latest
            docker push ghcr.io/${OWNER_LC}/hive-$agent:${{ github.sha }}
          done