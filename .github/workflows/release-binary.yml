name: Build and release hive binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          bin_name="hive_${{ matrix.goos }}_${{ matrix.goarch }}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath \
              -ldflags "-s -w \
                -X github.com/MartyFox/hive/internal/version.Version=${RELEASE_TAG} \
                -X github.com/MartyFox/hive/internal/version.Commit=${GITHUB_SHA::7} \
                -X github.com/MartyFox/hive/internal/version.BuildDate=${build_date}" \
              -o "dist/${bin_name}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/hive_${{ matrix.goos }}_${{ matrix.goarch }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: Hive ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/**/hive_*
            LICENSE
            NOTICE
            THIRD_PARTY_NOTICES.md
